name: snapshot

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build SeeMoreNext snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine snapshot version
        id: ver
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TS=$(date -u +%Y%m%d%H%M%S)
          REF="${{ github.ref }}"
          PRE=""
          if [[ "$REF" == refs/heads/* ]]; then
            BRANCH=${REF#refs/heads/}
            if [[ "$BRANCH" != "main" && "$BRANCH" != "master" ]]; then
              PRE="-${BRANCH//\//-}"
            fi
          elif [[ "$REF" == refs/tags/* ]]; then
            TAG=${REF#refs/tags/}
            if [[ "$TAG" == *"alpha"* || "$TAG" == *"beta"* || "$TAG" == *"rc"* ]]; then
              PRE="-prerelease"
            fi
          fi
          VER="2.0.0-SNAPSHOT${PRE}-${SHORT_SHA}-${TS}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Snapshot version: $VER"

      # Universal JAR: same baseline as release.yml, just stamped with a
      # snapshot version string.
      - name: Build universal shadow JAR
        run: ./gradlew clean shadowJar -PcustomVersion=${{ steps.ver.outputs.version }}

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeeMoreNext-snapshot-${{ steps.ver.outputs.version }}
          path: build/libs/SeeMoreNext-*.jar
          if-no-files-found: error
