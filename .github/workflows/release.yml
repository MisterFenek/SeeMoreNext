name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build SeeMoreNext ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SeeMoreNext
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Single, universal JAR compiled against Paper API 1.19.4 (the lowest
      # version we support). Paper guarantees binary compatibility for plugins
      # compiled against an older API, so this single artifact runs on
      # Paper 1.19 → 26.x and on Folia.
      - name: Build universal shadow JAR
        run: ./gradlew clean shadowJar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeeMoreNext-${{ github.ref_name }}
          path: build/libs/SeeMoreNext-*.jar
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SeeMoreNext-${{ github.ref_name }}
          path: dist

      - name: Verify and rename
        run: |
          ls -la dist
          mkdir -p release-jar
          find dist -name 'SeeMoreNext-*.jar' -exec cp -v {} release-jar/ \;
          ls -la release-jar

      - name: Create release notes
        run: |
          {
            echo "## SeeMoreNext ${{ github.ref_name }}"
            echo ""
            echo "A single universal JAR compiled against Paper API 1.19.4."
            echo "Works on Paper 1.19 → 26.x and Folia."
            echo ""
            echo "### Compatibility"
            echo ""
            echo "- Paper 1.19.4 / 1.20.x / 1.21.x"
            echo "- Paper 26.1 / 26.2 (Mojang new versioning)"
            echo "- Folia (regionised scheduler)"
            echo ""
            echo "### Install"
            echo ""
            echo "Drop \`SeeMoreNext-${{ github.ref_name }}.jar\` into your server's \`plugins/\` folder and restart."
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
          files: |
            release-jar/*.jar
