name: SeeMoreNext
main: com.seemorenext.seemorenext.SeeMoreNext
version: ${version}
api-version: '1.19'
authors: [ MisterFenek ]
description: Per-player view distance based on client settings. Fork of SeeMore by froobynooby, maintained for Paper 1.19 - 26.2 and Folia.
folia-supported: true
load: POSTWORLD

commands:
  seemorenext:
    description: base command SeeMoreNext.
    aliases: [smn]
    usage: |
      /<command> reload
      /<command> update
      /<command> refresh
      /<command> average
      /<command> players
      /<command> status
      /<command> debug-info
    permission: seemorenext.command.seemore

permissions:
  seemorenext.command.*:
    description: Access all SeeMoreNext subcommands.
    default: op
    children:
      seemorenext.command.seemore: true
      seemorenext.command.reload: true
      seemorenext.command.average: true
      seemorenext.command.players: true
      seemorenext.command.update: true
      seemorenext.command.debug-info: true
      seemorenext.command.bypass: true
  seemorenext.command.seemore:
    description: Access /seemorenext command.
    default: op
  seemorenext.command.average:
    description: Access /seemorenext average command.
    default: op
  seemorenext.command.reload:
    description: Access /seemorenext reload command.
    default: op
  seemorenext.command.players:
    description: Access /seemorenext players command.
    default: op
  seemorenext.command.update:
    description: Force update all players' view distances.
    default: op
  seemorenext.command.refresh:
    description: Force refresh your own view distance.
    default: true
  seemorenext.command.status:
    description: Show plugin status.
    default: true
  seemorenext.command.debug-info:
    description: Show debug information.
    default: op
  seemorenext.bypass:
    description: Bypass view distance clamping (always use max).
    default: false
